<!-- Header estático do site (também é injetado dinamicamente pelo `js/main.js`).
     Contém:
     - logo-area: nome do site e bandeira animada
     - menu: links de navegação
     - header-content: título principal e slogan (os elementos têm ids usados para animação no JS: `logo` e `slogan`)
-->
<header>
    <div class="header-top">
        <div class="logo-area">
            <a class="logo-link" href="/index.html" aria-label="Ir para a página inicial">
                <img class="logo-icon" src="/img/icone-96.png" alt="Natrip Aventuras">
            </a>
        </div>

        <nav class="menu">
            <a href="index.html">Início</a>
            <a href="/sobre.html">Sobre</a>
            <a href="/contato.html">Contato</a>
            <!-- 'perfil-link' era usado na versão estática; a versão injetada por JS usa um botão com dropdown -->
            <a href="perfil.html" class="perfil-link">👤 Perfil</a>
        </nav>
    </div>

    <div class="header-content">
        <h1 id="logo">Natrip Aventuras</h1>
        <p id="slogan">Viagens inesquecíveis por Minas Gerais</p>
    </div>
</header>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Admin — Produtos | Natrip Aventura</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- header injected by js/main.js -->

<section class="perfil-container">
    <div class="perfil-card">
        <h2>Gerenciar Produtos</h2>
        <div id="admin-msg" style="margin-bottom:12px;color:#c33;"></div>

        <div class="admin-fields" style="display:flex;flex-direction:column;gap:12px;align-items:flex-start;margin-bottom:16px;">
            <div class="form-field" style="width:100%;">
                <label for="product-name">Nome do Produto</label>
                <input id="product-name" type="text" placeholder="Ex: Camiseta Natrip" style="padding:8px;border-radius:8px;border:1px solid #ddd;width:100%;" />
            </div>

            <div class="form-field" style="width:100%;">
                <label for="product-category">Categoria</label>
                <select id="product-category" style="padding:8px;border-radius:8px;border:1px solid #ddd;width:100%;"></select>
                <input id="product-category-new" type="text" placeholder="Nova categoria" style="margin-top:8px;padding:8px;border-radius:8px;border:1px solid #ddd;width:100%;display:none;" />
            </div>

            <div class="form-field" style="width:100%;">
                <label for="product-price">Preço (R$)</label>
                <input id="product-price" type="number" min="0" step="0.01" placeholder="0.00" style="padding:8px;border-radius:8px;border:1px solid #ddd;width:180px;" />
            </div>

            <div class="form-field" style="width:100%;">
                <label for="product-stock">Estoque (peças)</label>
                <input id="product-stock" type="number" min="0" step="1" placeholder="Ex: 10" style="padding:8px;border-radius:8px;border:1px solid #ddd;width:180px;" />
            </div>

            <div class="form-field" style="width:100%;">
                <label>Galeria de Imagens</label>
                <p style="font-size:0.82rem;color:#999;margin:2px 0 8px;">A primeira imagem ser&#225; usada como capa na listagem.</p>
                <input id="product-gallery-input" type="file" accept="image/*" multiple style="padding:8px;border-radius:8px;border:1px solid #ddd;width:100%;" />
                <div id="product-gallery-preview" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;"></div>
            </div>

            <div class="form-field" style="width:100%;">
                <label>Modelos / Variantes</label>
                <p style="font-size:0.82rem;color:#999;margin:2px 0 8px;">Ex: Bon&#233; Azul, Bon&#233; Verde. Ao clicar no modelo na p&#225;gina do produto, a imagem muda.</p>
                <div id="variants-list" style="display:flex;flex-direction:column;gap:10px;margin-bottom:8px;"></div>
                <button type="button" id="add-variant-btn" class="save-btn" style="background:#fff;color:#C85F00;border:2px solid #C85F00;font-size:13px;padding:6px 16px;width:auto;">+ Adicionar Modelo</button>
            </div>

            <div style="width:100%;display:flex;justify-content:flex-end;">
                <button id="product-add" class="save-btn">Adicionar Produto</button>
            </div>
        </div>

        <div id="products-list"></div>
    </div>
</section>

<footer>
    <p>© 2026 Natrip Aventura</p>
</footer>

<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const auth = window.natripAuth;
    const current = auth ? auth.getCurrentUser() : JSON.parse(localStorage.getItem('natrip_currentUser')||'null');
    const msg = document.getElementById('admin-msg');
    let selectedGalleryImages = [];
    let selectedVariants = [];

    if (!current) { msg.textContent='Acesso restrito: faça login como administrador.'; return; }

    function getUsers(){
        try { return JSON.parse(localStorage.getItem('natrip_users') || '[]'); } catch(e){ return []; }
    }

    async function checkAdmin() {
        try {
            const resp = await fetch('/api/users');
            if (!resp.ok) {
                const usersLocal = getUsers();
                const fullLocal = usersLocal.find(u => u.email === current.email);
                if (!fullLocal || fullLocal.role !== 'admin') { msg.textContent='Acesso negado. Somente administradores.'; return false; }
                return true;
            }
            const users = await resp.json();
            const full = users.find(u => u.email === current.email);
            if (!full || full.role !== 'admin') { msg.textContent='Acesso negado. Somente administradores.'; return false; }
            return true;
        } catch (e) {
            const usersLocal = getUsers();
            const fullLocal = usersLocal.find(u => u.email === current.email);
            if (!fullLocal || fullLocal.role !== 'admin') { msg.textContent='Acesso negado. Somente administradores.'; return false; }
            return true;
        }
    }

    const BASE_CATEGORIES = [
        'camisas (masculino)',
        'camisas (feminina)',
        'calcas (masculino)',
        'calcas (feminina)'
    ];
    const CATEGORY_KEY = 'natrip_product_categories';

    function loadCustomCategories(){
        try {
            const arr = JSON.parse(localStorage.getItem(CATEGORY_KEY) || '[]');
            return Array.isArray(arr) ? arr.filter(c => c && !BASE_CATEGORIES.includes(c)).map(c=>c.trim()).filter(Boolean) : [];
        } catch(e){ return []; }
    }

    function saveCustomCategories(list){
        const unique = Array.from(new Set((list||[]).map(c=>c.trim()).filter(Boolean))).filter(c => !BASE_CATEGORIES.includes(c));
        localStorage.setItem(CATEGORY_KEY, JSON.stringify(unique));
    }

    function buildCategoryOptions(selected){
        const select = document.getElementById('product-category');
        if (!select) return;
        const custom = loadCustomCategories();
        const merged = [...BASE_CATEGORIES, ...custom, 'outros...'];
        const current = selected || select.value;
        select.innerHTML = '';
        const placeholder = document.createElement('option'); placeholder.value=''; placeholder.textContent='Selecione uma categoria';
        select.appendChild(placeholder);
        merged.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            if (cat === current) opt.selected = true;
            select.appendChild(opt);
        });
    }

    async function getProducts(){
        try {
            const resp = await fetch('/api/products');
            if (!resp.ok) return [];
            const items = await resp.json();
            return Array.isArray(items) ? items : [];
        } catch(e){
            return [];
        }
    }

    async function saveProducts(items){
        const resp = await fetch('/api/products/upsert', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ products: items })
        });
        if (!resp.ok) {
            const errText = await resp.text().catch(()=>'');
            throw new Error(errText || 'Falha ao salvar produtos');
        }
    }

    async function deleteProduct(id){
        const resp = await fetch('/api/products/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id })
        });
        if (!resp.ok) throw new Error('Falha ao remover produto');
    }

    function formatBRL(v){
        return Number(v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function compressImg(file, maxW, quality){
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onerror = () => reject(reader.error || new Error('Falha ao ler imagem'));
            reader.onload = e => {
                const img = new Image();
                img.onerror = () => reject(new Error('Falha ao processar imagem'));
                img.onload = () => {
                    let w = img.width, h = img.height;
                    if (w > maxW) {
                        h = Math.round(h * maxW / w);
                        w = maxW;
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = w;
                    canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    async function renderProducts(){
        const list = document.getElementById('products-list');
        if (!list) return;
        const items = await getProducts();
        if (!items.length) {
            list.innerHTML = '<p style="color:#666;">Nenhum produto cadastrado.</p>';
            return;
        }

        list.innerHTML = items.map(item => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:#fff;border-radius:8px;margin-bottom:12px;box-shadow:0 6px 18px rgba(0,0,0,0.06);">
                <div style="display:flex;gap:12px;align-items:center;">
                    <img src="${item.image || item.img || ''}" alt="${item.name}" style="width:90px;height:70px;object-fit:cover;border-radius:8px;border:1px solid #eee;" onerror="this.style.display='none'" />
                    <div>
                        <strong style="color:#C85F00;">${item.name}</strong>
                        <div style="color:#666;font-size:13px;">Categoria: ${item.category || '-'}</div>
                        <div style="color:#666;">${formatBRL(item.price)}</div>
                        <div style="color:#666;font-size:13px;">Estoque: ${Number(item.stock || 0)}</div>
                    </div>
                </div>
                <button class="save-btn" data-action="remove" data-id="${item.id || ''}" ${item.id ? '' : 'disabled'} style="background:#c33;border-color:#c33;width:82px;padding:5px 6px;font-size:12px;line-height:1.1;">Remover</button>
            </div>
        `).join('');
    }

    function resetForm(){
        const nameEl = document.getElementById('product-name');
        const categoryEl = document.getElementById('product-category');
        const categoryNewEl = document.getElementById('product-category-new');
        const priceEl = document.getElementById('product-price');
        const stockEl = document.getElementById('product-stock');
        const galleryInput = document.getElementById('product-gallery-input');
        if (nameEl) nameEl.value = '';
        if (categoryEl) categoryEl.value = '';
        if (categoryNewEl){ categoryNewEl.value=''; categoryNewEl.style.display='none'; }
        if (priceEl) priceEl.value = '';
        if (stockEl) stockEl.value = '';
        if (galleryInput) galleryInput.value = '';
        selectedGalleryImages = [];
        selectedVariants = [];
        renderGalleryPreview();
        renderVariants();
    }

    function renderGalleryPreview(){
        const previewEl = document.getElementById('product-gallery-preview');
        if (!previewEl) return;
        previewEl.innerHTML = selectedGalleryImages.map((src, i) => `
            <div style="position:relative;display:inline-block;text-align:center;">
                <img src="${src}" alt="img ${i+1}" style="width:80px;height:60px;object-fit:cover;border-radius:6px;border:${i===0 ? '2px solid #C85F00' : '1px solid #ddd'};" />
                <button type="button" data-w-auto onclick="window._removeGalleryImage(${i})" style="position:absolute;top:-6px;right:-6px;background:#c33;color:#fff;border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:11px;line-height:1;padding:0;">&#215;</button>
                ${i===0 ? '<div style="font-size:10px;color:#C85F00;font-weight:600;">Capa</div>' : ''}
            </div>
        `).join('');
    }

    window._removeGalleryImage = function(index){
        selectedGalleryImages.splice(index, 1);
        renderGalleryPreview();
    };

    function buildVariantRow(variantObj, index){
        const div = document.createElement('div');
        div.style.cssText = 'display:flex;gap:8px;align-items:flex-start;padding:10px;background:#faf9f7;border-radius:8px;border:1px solid #eee;';
        div.dataset.variantIndex = index;
        const imgTag = (variantObj && variantObj.image) ? `<img src="${variantObj.image}" style="margin-top:6px;width:60px;height:45px;object-fit:cover;border-radius:6px;border:1px solid #ddd;" />` : '';
        div.innerHTML = `
            <div style="flex:1;">
                <input type="text" placeholder="Nome do modelo (ex: Bon&#233; Azul)" value="${(variantObj && variantObj.label) || ''}"
                    style="padding:6px;border-radius:6px;border:1px solid #ddd;width:100%;margin-bottom:6px;"
                    data-variant-label="${index}" />
                <input type="file" accept="image/*" data-variant-img="${index}" style="font-size:12px;" />
                ${imgTag}
            </div>
            <button type="button" data-w-auto onclick="window._removeVariant(${index})" style="background:#c33;color:#fff;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:13px;flex-shrink:0;margin-top:2px;">&#10005;</button>
        `;
        const labelInput = div.querySelector('[data-variant-label]');
        labelInput.addEventListener('input', () => {
            if (selectedVariants[index]) selectedVariants[index].label = labelInput.value;
        });
        const imgInput = div.querySelector('[data-variant-img]');
        imgInput.addEventListener('change', async (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            try {
                const data = await compressImg(file, 1280, 0.82);
                if (selectedVariants[index]) selectedVariants[index].image = data;
                renderVariants();
            } catch (err) {
                msg.style.color = '#c33';
                msg.textContent = 'Erro ao processar a imagem do modelo.';
            }
        });
        return div;
    }

    window._removeVariant = function(index){
        selectedVariants.splice(index, 1);
        renderVariants();
    };

    function renderVariants(){
        const listEl = document.getElementById('variants-list');
        if (!listEl) return;
        listEl.innerHTML = '';
        selectedVariants.forEach((v, i) => {
            listEl.appendChild(buildVariantRow(v, i));
        });
    }

    function initGalleryUpload(){
        const input = document.getElementById('product-gallery-input');
        if (!input) return;
        input.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files || []);
            if (!files.length) return;
            try {
                const images = await Promise.all(files.map(file => compressImg(file, 1280, 0.82)));
                selectedGalleryImages.push(...images.filter(Boolean));
                renderGalleryPreview();
            } catch (err) {
                msg.style.color = '#c33';
                msg.textContent = 'Erro ao processar as imagens do produto.';
            } finally {
                input.value = '';
            }
        });
    }

    function initVariantBuilder(){
        const addBtn = document.getElementById('add-variant-btn');
        if (!addBtn) return;
        addBtn.addEventListener('click', () => {
            selectedVariants.push({ label: '', image: '' });
            renderVariants();
        });
    }

    function initCategorySelect(){
        const select = document.getElementById('product-category');
        const newInput = document.getElementById('product-category-new');
        buildCategoryOptions();
        if (!select || !newInput) return;
        select.addEventListener('change', (e)=>{
            const val = e.target.value;
            if (val === 'outros...') {
                newInput.style.display = 'block';
                newInput.focus();
            } else {
                newInput.style.display = 'none';
                newInput.value = '';
            }
        });
    }

    async function init(){
        const ok = await checkAdmin();
        if (!ok) return;

        initCategorySelect();
        initGalleryUpload();
        initVariantBuilder();
        await renderProducts();

        const addBtn = document.getElementById('product-add');
        if (!addBtn) return;

        addBtn.addEventListener('click', async ()=>{
            const name = (document.getElementById('product-name')?.value || '').trim();
            const categorySelect = document.getElementById('product-category');
            const categoryNew = document.getElementById('product-category-new');
            let category = (categorySelect?.value || '').trim();
            const priceRaw = document.getElementById('product-price')?.value || '';
            const stockRaw = document.getElementById('product-stock')?.value || '';
            const price = parseFloat(priceRaw);
            const stock = Number(stockRaw);

            if (!name) return alert('Preencha o nome do produto.');
            if (!category) return alert('Selecione uma categoria.');
            if (category === 'outros...') {
                const newCat = (categoryNew?.value || '').trim();
                if (!newCat) return alert('Digite o nome da nova categoria.');
                category = newCat;
                const custom = loadCustomCategories();
                if (!custom.includes(newCat)) {
                    const updated = [...custom, newCat];
                    saveCustomCategories(updated);
                    buildCategoryOptions(newCat);
                }
            }
            if (isNaN(price) || price < 0) return alert('Informe um preço válido.');
            if (!Number.isInteger(stock) || stock < 0) return alert('Informe um estoque válido (somente números inteiros).');
            if (!selectedGalleryImages.length) return alert('Selecione pelo menos uma imagem do produto.');
            const validVariants = selectedVariants.filter(v => (v.label || '').trim() || (v.image || ''));

            const newItem = {
                name,
                category,
                price: parseFloat(price.toFixed(2)),
                stock,
                image: selectedGalleryImages[0],
                gallery: selectedGalleryImages,
                variants: validVariants,
                createdBy: current.email,
                createdAt: new Date().toISOString()
            };

            try {
                await saveProducts([newItem]);
                resetForm();
                await renderProducts();
                msg.style.color = '#0a7';
                msg.textContent = 'Produto cadastrado com sucesso!';
            } catch (e) {
                msg.style.color = '#c33';
                msg.textContent = e && e.message ? e.message : 'Erro ao salvar produto no servidor.';
            }
        });

        const list = document.getElementById('products-list');
        if (list) {
            list.addEventListener('click', async (ev)=>{
                const btn = ev.target.closest('button[data-action="remove"]');
                if (!btn) return;

                const id = Number(btn.dataset.id || 0);
                if (!id) {
                    msg.style.color = '#c33';
                    msg.textContent = 'Não foi possível remover: produto sem ID.';
                    return;
                }

                if (!window.confirm('Deseja remover este produto?')) return;

                try {
                    await deleteProduct(id);
                    await renderProducts();
                    msg.style.color = '#0a7';
                    msg.textContent = 'Produto removido com sucesso!';
                } catch (e) {
                    msg.style.color = '#c33';
                    msg.textContent = 'Erro ao remover produto no servidor.';
                }
            });
        }
    }

    init();
});
</script>
</body>
</html>
